###############################################################
# BDA Portal — Backend Deployment + Service
# Replace <YOUR_DOCKERHUB_USERNAME> with your Docker Hub user
###############################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bda-backend
  namespace: bda-portal
  labels:
    app: bda-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bda-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bda-backend
        tier: backend
    spec:
      # Give pods time to drain
      terminationGracePeriodSeconds: 30

      containers:
        - name: backend
          image: <YOUR_DOCKERHUB_USERNAME>/bda-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: "/data/bda_portal.db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bda-secrets
                  key: jwt-secret

          volumeMounts:
            - name: db-storage
              mountPath: /data

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: bda-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: bda-backend-svc
  namespace: bda-portal
  labels:
    app: bda-backend
spec:
  type: LoadBalancer          # Change to ClusterIP + Ingress for production
  selector:
    app: bda-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
