###############################################################
# BDA Portal — ConfigMap + Secret
#
# ⚠️  BEFORE APPLYING:
#   1. Set api-url to your actual backend LoadBalancer URL
#   2. Replace the jwt-secret base64 value (see instructions)
#
# Generate a strong JWT secret:
#   echo -n "$(openssl rand -hex 32)" | base64
###############################################################

apiVersion: v1
kind: ConfigMap
metadata:
  name: bda-config
  namespace: bda-portal
data:
  # ← Paste your backend LoadBalancer URL here
  api-url: "http://REPLACE_WITH_BACKEND_LB_URL:3000"

---
apiVersion: v1
kind: Secret
metadata:
  name: bda-secrets
  namespace: bda-portal
type: Opaque
data:
  # base64("bda-secret-key-change-in-production")
  # Run: echo -n "your-strong-secret" | base64
  jwt-secret: YmRhLXNlY3JldC1rZXktY2hhbmdlLWluLXByb2R1Y3Rpb24=
