###############################################################
# BDA Portal — Frontend Deployment + Service
# Replace <YOUR_DOCKERHUB_USERNAME> with your Docker Hub user
# Set BDA_API_URL to the external URL of bda-backend-svc
###############################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bda-frontend
  namespace: bda-portal
  labels:
    app: bda-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bda-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bda-frontend
        tier: frontend
    spec:
      terminationGracePeriodSeconds: 15

      containers:
        - name: frontend
          image: <YOUR_DOCKERHUB_USERNAME>/bda-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          env:
            # ──────────────────────────────────────────────────────
            # IMPORTANT: set this to your backend LoadBalancer URL
            # e.g.  http://a3c8f028eb.ap-south-2.elb.amazonaws.com:3000
            # ──────────────────────────────────────────────────────
            - name: BDA_API_URL
              valueFrom:
                configMapKeyRef:
                  name: bda-config
                  key: api-url

          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: bda-frontend-svc
  namespace: bda-portal
  labels:
    app: bda-frontend
spec:
  type: LoadBalancer
  selector:
    app: bda-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
