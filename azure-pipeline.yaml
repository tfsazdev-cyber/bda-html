trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  backendImage: 'tfsazdev/bda-backend'
  frontendImage: 'tfsazdev/bda-frontend'

steps:

# 🔐 Login
- task: Docker@2
  displayName: Login to Docker Hub
  inputs:
    command: login
    containerRegistry: 'bda-dockerhub-connection'

# ======================
# 🔹 BACKEND
# ======================

- task: Docker@2
  displayName: Build Backend Image
  inputs:
    command: build
    repository: $(backendImage)
    Dockerfile: '**/backend/Dockerfile'   # update path if needed
    tags: |
      latest

- task: Docker@2
  displayName: Push Backend Image
  inputs:
    command: push
    repository: $(backendImage)
    tags: |
      latest

# ======================
# 🔹 FRONTEND
# ======================

- task: Docker@2
  displayName: Build Frontend Image
  inputs:
    command: build
    repository: $(frontendImage)
    Dockerfile: '**/frontend/Dockerfile'  # update path if needed
    tags: |
      latest

- task: Docker@2
  displayName: Push Frontend Image
  inputs:
    command: push
    repository: $(frontendImage)
    tags: |
      latest